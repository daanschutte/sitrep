services:
  postgres:
    image: 'postgres:17'
    environment:
      - POSTGRES_DB=sitrep
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U dev -d sitrep' ]
      interval: 5s
      timeout: 5s
      retries: 5

  sitrep:
    image: sitrep:local
    build: .
    ports:
      - '8081:8080'
    env_file: .env
    environment:
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/sitrep
    depends_on:
      postgres:
        condition: service_healthy
